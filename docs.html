<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre été 2026 — Les docs 📚</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
:root{
  --indigo:#1a1040; --indigo-2:#2a1b5e; --sunset:#ff6b35; --gold:#ffc857;
  --cream:#fff6ea; --teal:#2ec4b6; --pink:#ff5d8f;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Poppins',system-ui,sans-serif;background:linear-gradient(180deg,#0d0826,#1a1040 30%);color:var(--cream);min-height:100vh}

/* ── Tab bar ── */
nav{position:sticky;top:0;z-index:10;display:flex;gap:8px;justify-content:flex-start;align-items:center;padding:12px 14px;background:rgba(13,8,38,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.1);overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:var(--cream);border-radius:999px;padding:10px 18px;font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap;min-height:44px;display:flex;align-items:center;transition:all .15s}
.tab.on{background:var(--gold);border-color:var(--gold);color:#3a2400}
.tab.game{background:linear-gradient(120deg,var(--pink),var(--sunset));border:none;color:#fff}

/* ── Article ── */
main{max-width:760px;margin:0 auto;padding:34px 22px 80px}
#status{text-align:center;opacity:.6;padding:40px 0;font-size:.95rem}
article h1{font-size:clamp(1.6rem,5.5vw,2.4rem);font-weight:900;line-height:1.15;margin:0 0 .8em;color:var(--gold)}
article h2{font-size:clamp(1.25rem,4.5vw,1.7rem);font-weight:800;margin:1.6em 0 .6em;color:var(--teal)}
article h3{font-size:clamp(1.05rem,4vw,1.3rem);font-weight:700;margin:1.4em 0 .5em;color:var(--pink)}
article p{line-height:1.75;margin:.9em 0;font-weight:400}
article li{line-height:1.7;margin:.35em 0 .35em 1.2em}
article strong{color:var(--gold)}
article em{color:var(--teal);font-style:italic}
article blockquote{border-left:4px solid var(--sunset);padding:10px 18px;margin:1.2em 0;background:rgba(255,107,53,.08);border-radius:0 14px 14px 0;font-size:.95rem;opacity:.9}
article blockquote p{margin:.3em 0}
article hr{border:none;border-top:1px solid rgba(255,255,255,.15);margin:2em 0}
article table{border-collapse:collapse;width:100%;margin:1.2em 0;font-size:.9rem;display:block;overflow-x:auto}
article th,article td{border:1px solid rgba(255,255,255,.18);padding:9px 12px;text-align:left;vertical-align:top}
article th{background:rgba(255,200,87,.14);color:var(--gold);font-weight:700}
article tr:nth-child(even) td{background:rgba(255,255,255,.04)}
article code{background:rgba(255,255,255,.1);border-radius:6px;padding:2px 7px;font-size:.88em}
article a{color:var(--teal)}
article input[type=checkbox]{margin-right:8px;accent-color:var(--teal);transform:scale(1.2)}
</style>
</head>
<body>

<nav>
  <a class="tab game" href="index.html">🎟️ Le jeu</a>
  <button class="tab" data-doc="reunion-voyage-ete-2026.md">📋 Le plan</button>
  <button class="tab" data-doc="decodeur-voyage-ete-2026.md">📖 Le récit</button>
  <button class="tab" data-doc="echelle-princesse-aventurier.md">👑 L'échelle</button>
</nav>

<main>
  <div id="status">Chargement… ⏳</div>
  <article id="content"></article>
</main>

<script>
const tabs = document.querySelectorAll('.tab[data-doc]');
const content = document.getElementById('content');
const status = document.getElementById('status');

async function load(doc, btn){
  tabs.forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  content.innerHTML=''; status.style.display='block'; status.textContent='Chargement… ⏳';
  try{
    const r = await fetch(doc);
    if(!r.ok) throw new Error(r.status);
    const md = await r.text();
    content.innerHTML = marked.parse(md);
    status.style.display='none';
    window.scrollTo(0,0);
    history.replaceState(null,'','?doc='+encodeURIComponent(doc));
  }catch(e){
    status.textContent = '😕 Impossible de charger ' + doc;
  }
}

tabs.forEach(t=>t.addEventListener('click',()=>load(t.dataset.doc,t)));

/* deep link ?doc=... sinon premier onglet */
const want = new URLSearchParams(location.search).get('doc');
const initial = [...tabs].find(t=>t.dataset.doc===want) || tabs[0];
load(initial.dataset.doc, initial);
</script>
</body>
</html>
